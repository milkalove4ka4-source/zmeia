<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра Змейка</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
        }
        #score {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="score">Счёт: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameSpeed = 100;
        let gameInterval;

        function main() {
            if (hasGameEnded()) {
                alert("Игра окончена! Твой счёт: " + score);
                resetGame();
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "lightgreen";
            ctx.strokeStyle = "darkgreen";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = "Счёт: " + score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Чтобы еда не спавнилась внутри змейки
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "red";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === 37 && !goingRight) { dx = -1; dy = 0; } // Влево
            if (keyPressed === 38 && !goingDown) { dx = 0; dy = -1; } // Вверх
            if (keyPressed === 39 && !goingLeft) { dx = 1; dy = 0; }  // Вправо
            if (keyPressed === 40 && !goingUp) { dx = 0; dy = 1; }    // Вниз
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 5, y: 5};
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = "Счёт: " + score;
        }

        document.addEventListener("keydown", changeDirection);
        gameInterval = setInterval(main, gameSpeed);
    </script>
</body>
</html>
