<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Player Customizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        .player-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .menu-section {
            width: 300px;
            background: rgba(30, 30, 40, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-section::-webkit-scrollbar {
            width: 8px;
        }

        .menu-section::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .menu-section::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.6);
            border-radius: 10px;
        }

        .menu-title {
            font-size: 24px;
            font-weight: bold;
            color: #64d8ff;
            text-shadow: 0 0 10px rgba(100, 216, 255, 0.5);
            margin-bottom: 10px;
        }

        .menu-category {
            margin-bottom: 15px;
        }

        .category-name {
            font-size: 14px;
            color: #a0a0ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
            border-bottom: 1px solid rgba(160, 160, 255, 0.3);
            padding-bottom: 8px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(100, 150, 255, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-item:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.6);
            transform: translateX(5px);
        }

        .toggle-item.active {
            background: rgba(100, 216, 255, 0.3);
            border-color: rgba(100, 216, 255, 0.8);
        }

        .toggle-switch {
            width: 40px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            flex-shrink: 0;
        }

        .toggle-switch.active {
            background: rgba(100, 216, 255, 0.8);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }

        .toggle-switch.active::after {
            left: 18px;
        }

        .toggle-label {
            color: #e0e0ff;
            font-size: 14px;
            flex: 1;
        }

        .color-picker-section {
            margin-top: 15px;
        }

        .color-option {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .color-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .color-box:hover {
            transform: scale(1.1);
        }

        .color-box.selected {
            border-color: white;
            box-shadow: 0 0 10px currentColor;
        }

        .reset-btn {
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .reset-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-section">
            <canvas id="canvas"></canvas>
        </div>
        <div class="menu-section">
            <div class="menu-title">Кастомизация</div>

            <div class="menu-category">
                <div class="category-name">Аксессуары</div>
                <div class="toggle-item" data-item="hat">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Шляпа</span>
                </div>
                <div class="toggle-item" data-item="glasses">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Очки</span>
                </div>
                <div class="toggle-item" data-item="beard">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Борода</span>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-name">Броня</div>
                <div class="toggle-item" data-item="helmet">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Шлем</span>
                </div>
                <div class="toggle-item" data-item="chestplate">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Нагрудник</span>
                </div>
                <div class="toggle-item" data-item="leggings">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Штаны</span>
                </div>
                <div class="toggle-item" data-item="boots">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Сапоги</span>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-name">Цвет кожи</div>
                <div class="color-option" id="skinColors"></div>
            </div>

            <button class="reset-btn">Сбросить всё</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.shadowMap.enabled = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // Player group
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // Player object to track items
        const player = {
            hat: false,
            glasses: false,
            beard: false,
            helmet: false,
            chestplate: false,
            leggings: false,
            boots: false,
            skinColor: 0xffb89b
        };

        // Create player body
        function createPlayerBody() {
            const group = new THREE.Group();

            // Head
            const headGeometry = new THREE.BoxGeometry(1, 1, 1);
            const headMaterial = new THREE.MeshStandardMaterial({ color: player.skinColor });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 1.5;
            head.castShadow = true;
            group.add(head);

            // Body
            const bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.5);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: player.skinColor });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.25;
            body.castShadow = true;
            group.add(body);

            // Left arm
            const leftArmGeometry = new THREE.BoxGeometry(0.4, 1.5, 0.4);
            const armMaterial = new THREE.MeshStandardMaterial({ color: player.skinColor });
            const leftArm = new THREE.Mesh(leftArmGeometry, armMaterial);
            leftArm.position.set(-0.75, 0.25, 0);
            leftArm.castShadow = true;
            group.add(leftArm);

            // Right arm
            const rightArm = new THREE.Mesh(leftArmGeometry, armMaterial);
            rightArm.position.set(0.75, 0.25, 0);
            rightArm.castShadow = true;
            group.add(rightArm);

            // Left leg
            const legGeometry = new THREE.BoxGeometry(0.4, 1.5, 0.4);
            const legMaterial = new THREE.MeshStandardMaterial({ color: 0x0066cc });
            const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
            leftLeg.position.set(-0.3, -1.25, 0);
            leftLeg.castShadow = true;
            group.add(leftLeg);

            // Right leg
            const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
            rightLeg.position.set(0.3, -1.25, 0);
            rightLeg.castShadow = true;
            group.add(rightLeg);

            return group;
        }

        const playerBody = createPlayerBody();
        playerGroup.add(playerBody);

        // Items group
        const itemsGroup = new THREE.Group();
        playerGroup.add(itemsGroup);

        // Hat
        function createHat() {
            const group = new THREE.Group();
            const hatGeometry = new THREE.BoxGeometry(1.3, 0.4, 1.3);
            const hatMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const hat = new THREE.Mesh(hatGeometry, hatMaterial);
            hat.position.y = 2.1;
            hat.castShadow = true;
            group.add(hat);
            return group;
        }

        // Glasses
        function createGlasses() {
            const group = new THREE.Group();
            
            const glassGeometry = new THREE.BoxGeometry(0.3, 0.2, 0.1);
            const glassMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const leftGlass = new THREE.Mesh(glassGeometry, glassMaterial);
            leftGlass.position.set(-0.25, 1.7, 0.55);
            group.add(leftGlass);
            
            const rightGlass = new THREE.Mesh(glassGeometry, glassMaterial);
            rightGlass.position.set(0.25, 1.7, 0.55);
            group.add(rightGlass);
            
            return group;
        }

        // Beard
        function createBeard() {
            const group = new THREE.Group();
            const beardGeometry = new THREE.BoxGeometry(1, 0.3, 0.2);
            const beardMaterial = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
            const beard = new THREE.Mesh(beardGeometry, beardMaterial);
            beard.position.y = 1.1;
            beard.position.z = 0.45;
            group.add(beard);
            return group;
        }

        // Helmet
        function createHelmet() {
            const group = new THREE.Group();
            const helmetGeometry = new THREE.BoxGeometry(1.2, 1.1, 1.2);
            const helmetMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x888888,
                metalness: 0.8,
                roughness: 0.2
            });
            const helmet = new THREE.Mesh(helmetGeometry, helmetMaterial);
            helmet.position.y = 1.5;
            helmet.castShadow = true;
            group.add(helmet);
            return group;
        }

        // Chestplate
        function createChestplate() {
            const group = new THREE.Group();
            const chestGeometry = new THREE.BoxGeometry(1.2, 1.7, 0.7);
            const chestMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x666666,
                metalness: 0.7,
                roughness: 0.3
            });
            const chest = new THREE.Mesh(chestGeometry, chestMaterial);
            chest.position.y = 0.25;
            chest.castShadow = true;
            group.add(chest);
            return group;
        }

        // Leggings
        function createLeggings() {
            const group = new THREE.Group();
            const leggingsGeometry = new THREE.BoxGeometry(0.5, 1.6, 0.5);
            const leggingsMaterial = new THREE.MeshStandardMaterial({ color: 0x444444 });
            
            const leftLeg = new THREE.Mesh(leggingsGeometry, leggingsMaterial);
            leftLeg.position.set(-0.3, -0.9, 0);
            leftLeg.castShadow = true;
            group.add(leftLeg);
            
            const rightLeg = new THREE.Mesh(leggingsGeometry, leggingsMaterial);
            rightLeg.position.set(0.3, -0.9, 0);
            rightLeg.castShadow = true;
            group.add(rightLeg);
            
            return group;
        }

        // Boots
        function createBoots() {
            const group = new THREE.Group();
            const bootsGeometry = new THREE.BoxGeometry(0.5, 0.3, 0.5);
            const bootsMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
            
            const leftBoot = new THREE.Mesh(bootsGeometry, bootsMaterial);
            leftBoot.position.set(-0.3, -2.05, 0);
            leftBoot.castShadow = true;
            group.add(leftBoot);
            
            const rightBoot = new THREE.Mesh(bootsGeometry, bootsMaterial);
            rightBoot.position.set(0.3, -2.05, 0);
            rightBoot.castShadow = true;
            group.add(rightBoot);
            
            return group;
        }

        // Toggle items
        function toggleItem(itemName) {
            // Remove old item
            itemsGroup.children = itemsGroup.children.filter(child => {
                if (child.userData.itemName === itemName) {
                    itemsGroup.remove(child);
                    return false;
                }
                return true;
            });

            // Add new item if enabled
            if (!player[itemName]) {
                player[itemName] = true;
                let item;
                switch(itemName) {
                    case 'hat':
                        item = createHat();
                        break;
                    case 'glasses':
                        item = createGlasses();
                        break;
                    case 'beard':
                        item = createBeard();
                        break;
                    case 'helmet':
                        item = createHelmet();
                        break;
                    case 'chestplate':
                        item = createChestplate();
                        break;
                    case 'leggings':
                        item = createLeggings();
                        break;
                    case 'boots':
                        item = createBoots();
                        break;
                }
                if (item) {
                    item.userData.itemName = itemName;
                    itemsGroup.add(item);
                }
            } else {
                player[itemName] = false;
            }
        }

        // Setup color picker
        const skinColors = [
            { hex: 0xffb89b, name: 'Light' },
            { hex: 0xf4a460, name: 'Medium' },
            { hex: 0xd2691e, name: 'Dark' },
            { hex: 0x3a96dd, name: 'Blue' },
            { hex: 0x4cff00, name: 'Green' },
            { hex: 0xff00ff, name: 'Purple' }
        ];

        const colorContainer = document.getElementById('skinColors');
        skinColors.forEach((color, index) => {
            const box = document.createElement('div');
            box.className = 'color-box';
            if (index === 0) box.classList.add('selected');
            box.style.backgroundColor = `#${color.hex.toString(16).padStart(6, '0')}`;
            box.addEventListener('click', () => {
                document.querySelectorAll('.color-box').forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                player.skinColor = color.hex;
                updatePlayerColors();
            });
            colorContainer.appendChild(box);
        });

        // Update player colors
        function updatePlayerColors() {
            playerBody.children.forEach(mesh => {
                if (mesh.material.color) {
                    if (mesh.name === 'head' || mesh.name === 'body' || mesh.name === 'arm' || mesh.name === 'leg') {
                        mesh.material.color.setHex(player.skinColor);
                    }
                }
            });
        }

        // Event listeners
        document.querySelectorAll('.toggle-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const itemName = item.dataset.item;
                toggleItem(itemName);
                
                item.classList.toggle('active');
                item.querySelector('.toggle-switch').classList.toggle('active');
            });
        });

        document.querySelector('.reset-btn').addEventListener('click', () => {
            Object.keys(player).forEach(key => {
                if (key !== 'skinColor') {
                    player[key] = false;
                }
            });
            
            itemsGroup.clear();
            document.querySelectorAll('.toggle-item').forEach(item => {
                item.classList.remove('active');
                item.querySelector('.toggle-switch').classList.remove('active');
            });
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            playerGroup.rotation.y += 0.005;
            
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        animate();
    </script>
</body>
</html>
