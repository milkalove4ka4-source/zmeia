<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра Змейка</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 10px;
        }

        /* Экран меню */
        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        label {
            font-size: 18px;
            margin-bottom: 10px;
        }

        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
            background: #444;
            color: white;
            cursor: pointer;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Игровой интерфейс */
        #game-container {
            display: none; /* Скрыт по умолчанию */
            position: relative;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 400px;
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .score-box {
            color: #4CAF50;
        }

        .highscore-box {
            color: #ff9800;
        }

        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Змейка</h1>
        <label for="speed-select">Выбери скорость:</label>
        <select id="speed-select">
            <option value="150">Новичок (Медленно)</option>
            <option value="100" selected>Любитель (Нормально)</option>
            <option value="60">Профи (Быстро)</option>
            <option value="35">Киберспорт (Бешено)</option>
        </select>
        <button id="start-btn">Играть</button>
    </div>

    <div id="game-container">
        <div class="hud">
            <div class="score-box">Очки: <span id="score">0</span></div>
            <div class="highscore-box">Рекорд: <span id="highscore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Элементы DOM
        const menu = document.getElementById("menu");
        const gameContainer = document.getElementById("game-container");
        const startBtn = document.getElementById("start-btn");
        const speedSelect = document.getElementById("speed-select");
        const scoreTxt = document.getElementById("score");
        const highscoreTxt = document.getElementById("highscore");

        // Настройки сетки
        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;

        // Игровые переменные
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // Движение по X
        let dy = 0;        // Движение по Y
        let score = 0;
        let highscore = localStorage.getItem("snake_highscore") || 0;
        let gameInterval;
        let gameSpeed = 100;
        let changingDirection = false; // Защита от быстрого нажатия клавиш

        // Отображаем начальный рекорд из локального хранилища браузера
        highscoreTxt.textContent = highscore;

        // Кнопка старта
        startBtn.addEventListener("click", () => {
            gameSpeed = parseInt(speedSelect.value);
            menu.style.display = "none";
            gameContainer.style.display = "block";
            resetGame();
        });

        // Сброс и запуск игры
        function resetGame() {
            snake = [
                { x: gridSize * 5, y: gridSize * 5 },
                { x: gridSize * 4, y: gridSize * 5 },
                { x: gridSize * 3, y: gridSize * 5 }
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreTxt.textContent = score;
            changingDirection = false;
            createFood();
            
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // Главный цикл игры
        function gameLoop() {
            if (hasGameEnded()) {
                alert(`Игра окончена! Вы набрали: ${score} очков.`);
                clearInterval(gameInterval);
                gameContainer.style.display = "none";
                menu.style.display = "flex";
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Очистка поля
        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Рисуем змейку
        function drawSnake() {
            snake.forEach((part, index) => {
                // Голова чуть светлее тела
                ctx.fillStyle = index === 0 ? "#66bb6a" : "#4CAF50";
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2); // -2 для сетчатого эффекта
            });
        }

        // Движение змейки
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Проверка: съела ли еду?
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreTxt.textContent = score;
                
                // Проверка рекорда на ходу
                if (score > highscore) {
                    highscore = score;
                    highscoreTxt.textContent = highscore;
                    localStorage.setItem("snake_highscore", highscore);
                }
                createFood();
            } else {
                snake.pop(); // Удаляем хвост, если еду не ели
            }
        }

        // Спавн еды
        function createFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // Чтобы еда не заспавнилась внутри змейки
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    createFood();
                }
            });
        }

        // Рисуем еду
        function drawFood() {
            ctx.fillStyle = "#ff4444";
            ctx.fillRect(food.x, food.y, gridSize - 2, gridSize - 2);
        }

        // Проверка столкновений
        function hasGameEnded() {
            // Столкновение со стенами
            if (snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height) {
                return true;
            }
            // Столкновение с хвостиком
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        // Управление стрелочками и WASD
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            // Коды клавиш: Стрелочки и WASD
            const LEFT = 37,  A = 65;
            const UP = 38,    W = 87;
            const RIGHT = 39, D = 68;
            const DOWN = 40,  S = 83;

            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((keyPressed === LEFT || keyPressed === A) && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === UP || keyPressed === W) && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if ((keyPressed === RIGHT || keyPressed === D) && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === DOWN || keyPressed === S) && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }
    </script>
</body>
</html>
