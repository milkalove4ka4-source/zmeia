<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Супер Змейка</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .stats-container {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: bold;
            background: #2a2a2a;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-box span {
            color: #4caf50;
        }
        #highScoreBox span {
            color: #ffeb3b;
        }
        #levelBox span {
            color: #00bcd4;
        }
        canvas {
            border: 6px solid #333;
            background-color: #111;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .controls-hint {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-box">Счёт: <span id="score">0</span></div>
        <div class="stat-box" id="levelBox">Уровень: <span id="level">1</span></div>
        <div class="stat-box" id="highScoreBox">Рекорд: <span id="highScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="controls-hint">Управляй стрелочками на клавиатуре</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const levelElement = document.getElementById("level");
        const highScoreElement = document.getElementById("highScore");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1;
        let dy = 0;
        
        let score = 0;
        let level = 1;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreElement.innerText = highScore;

        let baseSpeed = 120; // Стартовая скорость (чем меньше число, тем быстрее)
        let gameTimeout;
        let isChangingDirection = false;

        function main() {
            if (hasGameEnded()) {
                alert(`Игра окончена!\nТвой счёт: ${score}\nДостигнут уровень: ${level}`);
                resetGame();
                return;
            }

            isChangingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();

            // Рассчитываем скорость в зависимости от уровня (ускоряем на 10мс за уровень)
            let currentSpeed = Math.max(40, baseSpeed - (level - 1) * 10);
            gameTimeout = setTimeout(main, currentSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Легкая сетка на фоне для красоты
            ctx.strokeStyle = "#1a1a1a";
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Голова змеи чуть светлее тела
                ctx.fillStyle = index === 0 ? "#66bb6a" : "#4caf50";
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                
                // Проверка и обновление рекорда
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.innerText = highScore;
                    localStorage.setItem("snakeHighScore", highScore);
                }

                // Повышение уровня каждые 50 очков (5 съеденных яблок)
                let newLevel = Math.floor(score / 50) + 1;
                if (newLevel !== level) {
                    level = newLevel;
                    levelElement.innerText = level;
                }

                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Чтобы еда не появилась внутри змейки
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                    break;
                }
            }
        }

        function drawFood() {
            ctx.fillStyle = "#e91e63"; // Розовато-красное яблоко
            ctx.beginPath();
            let centerX = food.x * gridSize + gridSize/2;
            let centerY = food.y * gridSize + gridSize/2;
            ctx.arc(centerX, centerY, gridSize/2 - 2, 0, 2 * Math.PI);
            ctx.fill();
        }

        function hasGameEnded() {
            // Врезался в хвост
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            // Врезался в стены
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function changeDirection(event) {
            if (isChangingDirection) return; // Защита от слишком быстрых нажатий

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === 37 && !goingRight) { dx = -1; dy = 0; isChangingDirection = true; }
            if (keyPressed === 38 && !goingDown) { dx = 0; dy = -1; isChangingDirection = true; }
            if (keyPressed === 39 && !goingLeft) { dx = 1; dy = 0; isChangingDirection = true; }
            if (keyPressed === 40 && !goingUp) { dx = 0; dy = 1; isChangingDirection = true; }
        }

        function resetGame() {
            clearTimeout(gameTimeout);
            snake = [{x: 10, y: 10}];
            food = {x: 5, y: 5};
            dx = 1;
            dy = 0;
            score = 0;
            level = 1;
            scoreElement.innerText = score;
            levelElement.innerText = level;
            main();
        }

        document.addEventListener("keydown", changeDirection);
        // Запуск игры
        main();
    </script>
</body>
</html>
