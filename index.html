<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Улучшенная Змейка</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2a2a2a;
            --text-color: #ffffff;
            --primary-accent: #4CAF50; /* Стандартный зеленый */
            --bonus-accent: #ffeb3b; /* Золотой */
            --food-accent: #ff4444; /* Красный */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Запрет скролла */
        }

        h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }

        /* ЭКРАН МЕНЮ */
        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            width: 320px;
            transition: opacity 0.3s ease;
        }

        .menu-group {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label { font-size: 14px; margin-bottom: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;}

        select, button {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: #444;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        select:hover, select:focus { background: #555; outline: none; }

        /* Стилизация чекбокса (Границы) */
        .checkbox-group {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary-accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Выбор скина (цвета) */
        #skin-preview-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 5px;
        }
        .skin-option {
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        .skin-option:hover { transform: scale(1.1); }
        .skin-option.active { border-color: white; transform: scale(1.15); }

        button#start-btn {
            width: 100%;
            background-color: var(--primary-accent);
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }
        button#start-btn:hover { background-color: #45a049; }

        /* ИГРОВОЙ ЭКРАН */
        #game-container {
            display: none; /* Скрыт по умолчанию */
            position: relative;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 400px;
            font-size: 18px;
            margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace; /* Моноширинный для очков */
        }

        .score-box { color: var(--primary-accent); font-weight: bold; }
        .highscore-box { color: var(--bonus-accent); opacity: 0.8; }

        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: block;
        }
        
        /* Эффект мерцания для золотого яблока */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 235, 59, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 235, 59, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 235, 59, 0); }
        }
    </style>
</head>
<body>

    <h1>SNAKE _ MOD</h1>

    <div id="menu">
        <div class="menu-group">
            <label for="speed-select">Скорость</label>
            <select id="speed-select">
                <option value="150">Новичок</option>
                <option value="100" selected>Любитель</option>
                <option value="65">Профи</option>
                <option value="40">Киберспорт</option>
            </select>
        </div>

        <div class="menu-group checkbox-group">
            <label for="border-switch">Границы убивают</label>
            <label class="switch">
                <input type="checkbox" id="border-switch" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="menu-group">
            <label>Цвет Змейки</label>
            <div id="skin-preview-container">
                </div>
        </div>

        <button id="start-btn">ИГРАТЬ</button>
    </div>

    <div id="game-container">
        <div class="hud">
            <div class="score-box">SCORE: <span id="score">0000</span></div>
            <div class="highscore-box">HI-SCORE: <span id="highscore">0000</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Элементы DOM
        const menu = document.getElementById("menu");
        const gameContainer = document.getElementById("game-container");
        const startBtn = document.getElementById("start-btn");
        const speedSelect = document.getElementById("speed-select");
        const borderSwitch = document.getElementById("border-switch");
        const skinContainer = document.getElementById("skin-preview-container");
        const scoreTxt = document.getElementById("score");
        const highscoreTxt = document.getElementById("highscore");

        // Настройки сетки
        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;

        // Конфигурация цветов (Скины)
        const skins = [
            { name: 'green', head: '#66bb6a', body: '#4CAF50' },
            { name: 'blue', head: '#42a5f5', body: '#2196f3' },
            { name: 'purple', head: '#ab47bc', body: '#9c27b0' },
            { name: 'orange', head: '#ffa726', body: '#ff9800' }
        ];
        let currentSkin = skins[0]; // По умолчанию зеленый

        // Игровые переменные
        let snake = [];
        let food = { x: 0, y: 0, isBonus: false };
        let bonusTimer = null; // Таймер исчезновения золотого яблока
        let dx = gridSize, dy = 0;
        let score = 0;
        let highscore = 0;
        let gameInterval;
        let gameSpeed = 100;
        let bordersKill = true;
        let changingDirection = false;

        // --- ИНИЦИАЛИЗАЦИЯ МЕНЮ И ЛОКАЛЬНОГО ХРАНИЛИЩА ---
        
        // 1. Попытка загрузить рекорд (может не работать в превью)
        try {
            const savedHighscore = localStorage.getItem("snake_mod_highscore");
            if (savedHighscore) {
                highscore = parseInt(savedHighscore);
                highscoreTxt.textContent = padScore(highscore);
            }
        } catch (e) { console.warn("LocalStorage недоступен."); }

        // 2. Генерируем выбор скинов
        skins.forEach((skin, index) => {
            const div = document.createElement('div');
            div.className = `skin-option ${index === 0 ? 'active' : ''}`;
            div.style.backgroundColor = skin.body;
            div.dataset.skinIndex = index;
            div.addEventListener('click', () => {
                // Снимаем активный класс со всех
                document.querySelectorAll('.skin-option').forEach(el => el.classList.remove('active'));
                // Добавляем текущему
                div.classList.add('active');
                currentSkin = skins[index];
                // Меняем основной цвет интерфейса под скин
                document.documentElement.style.setProperty('--primary-accent', currentSkin.body);
            });
            skinContainer.appendChild(div);
        });


        // --- ЛОГИКА ИГРЫ ---

        // Кнопка старта
        startBtn.addEventListener("click", () => {
            gameSpeed = parseInt(speedSelect.value);
            bordersKill = borderSwitch.checked;
            menu.style.opacity = "0";
            setTimeout(() => {
                menu.style.display = "none";
                gameContainer.style.display = "block";
                resetGame();
            }, 300);
        });

        // Форматирование очков (0000)
        function padScore(num) { return num.toString().padStart(4, '0'); }

        function resetGame() {
            snake = [
                { x: gridSize * 5, y: gridSize * 5 },
                { x: gridSize * 4, y: gridSize * 5 },
                { x: gridSize * 3, y: gridSize * 5 }
            ];
            dx = gridSize; dy = 0;
            score = 0;
            scoreTxt.textContent = padScore(score);
            changingDirection = false;
            
            // Сброс бонусов при рестарте
            if (bonusTimer) clearTimeout(bonusTimer);
            createFood(false); // Сначала обычная еда
            
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        function gameLoop() {
            if (hasGameEnded()) {
                gameOver();
                return;
            }
            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function gameOver() {
            clearInterval(gameInterval);
            if (bonusTimer) clearTimeout(bonusTimer);
            alert(`G A M E  O V E R\nОчки: ${score}`);
            
            // Показываем меню снова
            gameContainer.style.display = "none";
            menu.style.display = "flex";
            setTimeout(() => menu.style.opacity = "1", 10);
        }

        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? currentSkin.head : currentSkin.body;
                // Эффект скруглённых углов (слегка)
                ctx.fillRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // РЕЖИМ БЕЗ ГРАНИЦ
            if (!bordersKill) {
                if (head.x < 0) head.x = canvas.width - gridSize;
                else if (head.x >= canvas.width) head.x = 0;
                
                if (head.y < 0) head.y = canvas.height - gridSize;
                else if (head.y >= canvas.height) head.y = 0;
            }

            snake.unshift(head);

            // СЪЕЛИ ЕДУ
            if (snake[0].x === food.x && snake[0].y === food.y) {
                // Начисление очков
                if (food.isBonus) {
                    score += 30; // Золотое = 30
                    if (bonusTimer) clearTimeout(bonusTimer); // Отменяем таймер исчезновения
                } else {
                    score += 10; // Обычное = 10
                }
                
                scoreTxt.textContent = padScore(score);
                
                // Проверка рекорда
                if (score > highscore) {
                    highscore = score;
                    highscoreTxt.textContent = padScore(highscore);
                    try { localStorage.setItem("snake_mod_highscore", highscore); } catch(e){}
                }

                // Логика спавна следующей еды
                // Шанс 20% на золотое яблоко, если сейчас съели обычное
                const spawnBonus = !food.isBonus && Math.random() < 0.2;
                createFood(spawnBonus);
                
            } else {
                snake.pop(); // Обычное движение
            }
        }

        function createFood(isBonus = false) {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;
            food.isBonus = isBonus;

            // Чтобы не заспавнилось в змейке
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) createFood(isBonus);
            });

            // Если это золотой бонус, ставим таймер на 7 секунд
            if (isBonus) {
                if (bonusTimer) clearTimeout(bonusTimer);
                bonusTimer = setTimeout(() => {
                    // Если бонус не съели, заменяем его на обычную еду
                    if (gameContainer.style.display === "block") {
                        createFood(false);
                    }
                }, 7000); // 7 секунд
            }
        }

        function drawFood() {
            if (food.isBonus) {
                // Рисуем золотое яблоко (желтый круг с обводкой)
                ctx.fillStyle = varColor('--bonus-accent');
                ctx.beginPath();
                ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
            } else {
                // Обычная красная еда (квадрат)
                ctx.fillStyle = varColor('--food-accent');
                ctx.fillRect(food.x + 2, food.y + 2, gridSize - 4, gridSize - 4);
            }
        }

        // Вспомогательная функция для получения цвета из CSS переменных
        function varColor(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        function hasGameEnded() {
            // Столкновение с хвостиком (всегда убивает)
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Столкновение со стенами (только если включен режим)
            if (bordersKill) {
                if (snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height) {
                    return true;
                }
            }
            return false;
        }

        // Управление (Стрелочки + WASD)
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            if (changingDirection) return;

            // Коды клавиш
            const L = 37, A = 65, U = 38, W = 87, R = 39, D = 68, DOWN = 40, S = 83;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((keyPressed === L || keyPressed === A) && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
            else if ((keyPressed === U || keyPressed === W) && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
            else if ((keyPressed === R || keyPressed === D) && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
            else if ((keyPressed === DOWN || keyPressed === S) && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
        }
    </script>
</body>
</html>
